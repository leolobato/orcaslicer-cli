services:
  orcaslicer-cli:
    build:
      context: .
      args:
        # Forward the host's $GIT_COMMIT into the build so the running
        # container logs which revision it was built from. Set it before
        # invoking compose, e.g.:
        #   GIT_COMMIT=$(git rev-parse HEAD) docker compose up --build
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./app:/app/app
      - ./tests:/app/tests
      - ./conftest.py:/app/conftest.py
    environment:
      - ORCA_BINARY=/opt/orcaslicer/bin/orca-slicer
      - ORCA_HEADLESS_BINARY=/opt/orca-headless/bin/orca-headless
      - PROFILES_DIR=/opt/orcaslicer/profiles
      - USER_PROFILES_DIR=/data
      - CACHE_DIR=/data/cache
      # Set USE_HEADLESS_BINARY=1 to route /slice/v2 and /slice-stream/v2
      # through the new orca-headless binary. Default off — legacy /slice
      # multipart path keeps using the AppImage CLI.
      - USE_HEADLESS_BINARY=${USE_HEADLESS_BINARY:-0}
      - LOG_LEVEL=DEBUG
